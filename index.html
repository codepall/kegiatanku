<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal | Premium Sage</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <!-- Layar Login -->
  <div id="login-screen" class="screen active">
    <div class="login-card glass-panel">
      <h1>JadwalKu.</h1>
      <p>Kelola waktumu dengan elegan.</p>
      <div class="input-group">
        <label>Alamat Email</label>
        <input type="email" id="login-email" placeholder="contoh@gmail.com" required>
      </div>
      <div class="input-group">
        <label>Kata Sandi</label>
        <input type="password" id="login-password" placeholder="Minimal 6 karakter" required>
      </div>
      <div class="login-actions">
        <button id="btn-login" class="btn-primary">Login</button>
        <button id="btn-register" class="btn-secondary">Daftar</button>
      </div>
      <p id="login-error"></p>
    </div>
  </div>

  <!-- Layar Aplikasi -->
  <div id="app-screen" class="screen layout">
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-area">
          <i class="ph ph-calendar-check icon-logo"></i>
          <h2 class="sidebar-text">JadwalKu</h2>
        </div>
        <button id="btn-toggle-sidebar" class="btn-icon"><i class="ph ph-list"></i></button>
      </div>
      
      <ul class="nav-links" id="sidebar-nav">
        <li class="nav-label sidebar-text">Status</li>
        <li class="nav-item active" data-filter="status" data-value="all" title="Semua Kegiatan">
          <i class="ph ph-files"></i> <span class="sidebar-text">Semua Kegiatan</span>
        </li>
        <li class="nav-item" data-filter="status" data-value="pending" title="Belum Selesai">
          <i class="ph ph-clock"></i> <span class="sidebar-text">Belum Selesai</span>
        </li>
        <li class="nav-item" data-filter="status" data-value="completed" title="Selesai">
          <i class="ph ph-check-circle"></i> <span class="sidebar-text">Selesai</span>
        </li>
        
        <li class="nav-label sidebar-text">Kategori</li>
        <li class="nav-item" data-filter="category" data-value="PR" title="PR / Tugas">
          <i class="ph ph-book-open"></i> <span class="sidebar-text">PR / Tugas</span>
        </li>
        <li class="nav-item" data-filter="category" data-value="Organisasi" title="Organisasi">
          <i class="ph ph-users"></i> <span class="sidebar-text">Organisasi</span>
        </li>
        <li class="nav-item" data-filter="category" data-value="Pribadi" title="Pribadi">
          <i class="ph ph-user"></i> <span class="sidebar-text">Pribadi</span>
        </li>
      </ul>

      <div class="user-profile">
        <img id="user-avatar" src="" alt="Avatar">
        <div class="user-info sidebar-text">
          <span id="user-name">Nama</span>
          <button id="btn-logout">Logout</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="content-wrapper">
        <header>
          <div>
            <h1 id="greeting">Halo!</h1>
            <p id="header-subtitle">Berikut adalah jadwalmu hari ini.</p>
          </div>
          <button id="btn-add-task" class="btn-primary">+ Kegiatan</button>
        </header>

        <div class="task-container" id="task-list">
          <!-- Kegiatan dirender via JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Tambah Kegiatan -->
  <div id="modal" class="modal">
    <div class="modal-content glass-panel">
      <h3>Buat Kegiatan Baru</h3>
      
      <div class="input-group">
        <label>Nama / Judul Kegiatan</label>
        <input type="text" id="input-title" placeholder="Contoh: Rapat PMR atau Mengerjakan LKS" required>
      </div>

      <div class="form-row">
        <div class="input-group w-50">
          <label>Kategori</label>
          <select id="input-category">
            <option value="Umum">Umum / Pribadi</option>
            <option value="PR">PR / Tugas Sekolah</option>
            <option value="Organisasi">Organisasi</option>
          </select>
        </div>

        <!-- Ekstra PR -->
        <div class="input-group w-50" id="field-mapel" style="display: none;">
          <label>Mata Pelajaran</label>
          <select id="input-mapel">
            <option value="BIN">Bahasa Indonesia</option>
            <option value="BK">Bimbingan Konseling</option>
            <option value="BIG">Bahasa Inggris</option>
            <option value="IPS">IPS</option>
            <option value="PPKn">PPKn</option>
            <option value="Informatika">Informatika</option>
            <option value="IPA">IPA</option>
            <option value="MAT">Matematika</option>
            <option value="BJ">Bahasa Jawa</option>
            <option value="SB">Seni Budaya</option>
            <option value="PAI">PAI</option>
            <option value="PJOK">PJOK</option>
          </select>
        </div>

        <!-- Ekstra Organisasi -->
        <div class="input-group w-50" id="field-org-sub" style="display: none;">
          <label>Pilih Organisasi</label>
          <select id="input-sub-org">
            <option value="PMR">PMR</option>
            <option value="OSIS">OSIS</option>
            <option value="Kader Bank Sampah">Kader Bank Sampah</option>
            <option value="Kader Keamanan Pangan">Kader Keamanan Pangan</option>
          </select>
        </div>
      </div>

      <!-- Ekstra Durasi Organisasi -->
      <div class="input-group" id="field-org-duration" style="display: none;">
        <label>Durasi Kegiatan</label>
        <select id="input-durasi-org">
          <option value="1">1 Hari Saja</option>
          <option value="multi">Beberapa Hari</option>
        </select>
      </div>

      <!-- Blok Waktu Default (1 Hari & PR) -->
      <div id="block-time-single">
        <div class="input-group">
          <label id="label-date-single">Tanggal Kegiatan</label>
          <input type="date" id="input-date-single">
        </div>
        
        <!-- Wadah Jam Mulai/Selesai agar bisa disembunyikan saat PR -->
        <div class="form-row" id="time-start-end-container">
          <div class="input-group w-50">
            <label>Jam Mulai</label>
            <input type="time" id="input-time-start">
          </div>
          <div class="input-group w-50">
            <label>Jam Selesai</label>
            <input type="time" id="input-time-end">
          </div>
        </div>
      </div>

      <!-- Blok Waktu Multi-Hari (Khusus Organisasi) -->
      <div id="block-time-multi" style="display: none;">
        <div class="form-row">
          <div class="input-group w-50">
            <label>Tgl Mulai</label>
            <input type="date" id="input-date-start-multi">
          </div>
          <div class="input-group w-50">
            <label>Tgl Selesai</label>
            <input type="date" id="input-date-end-multi">
          </div>
        </div>
        <div class="input-group">
          <label>Jam Mulai Kegiatan (Tiap Hari)</label>
          <input type="time" id="input-time-multi">
        </div>
      </div>

      <div class="modal-actions">
        <button id="btn-cancel" class="btn-secondary">Batal</button>
        <button id="btn-save" class="btn-primary">Simpan</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
