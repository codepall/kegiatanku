<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal | Premium Sage</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

  <!-- Layar Login -->
  <div id="login-screen" class="screen active">
    <div class="login-card glass-panel">
      <h1>JadwalKu.</h1>
      <p>Kelola waktumu dengan elegan.</p>
      <div class="input-group">
        <label>Alamat Email</label>
        <input type="email" id="login-email" placeholder="contoh@gmail.com" required>
      </div>
      <div class="input-group">
        <label>Kata Sandi</label>
        <input type="password" id="login-password" placeholder="Minimal 6 karakter" required>
      </div>
      <div class="login-actions">
        <button id="btn-login" class="btn-primary">Login</button>
        <button id="btn-register" class="btn-secondary">Daftar</button>
      </div>
      <p id="login-error"></p>
    </div>
  </div>

  <!-- Layar Aplikasi -->
  <div id="app-screen" class="screen layout">
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-area">
          <i class="ph ph-calendar-check icon-logo"></i>
          <h2 class="sidebar-text">JadwalKu</h2>
        </div>
        <button id="btn-toggle-sidebar" class="btn-icon"><i class="ph ph-list"></i></button>
      </div>
      
      <ul class="nav-links" id="sidebar-nav">
        <li class="nav-label sidebar-text">Status</li>
        <li class="nav-item active" data-filter="status" data-value="all">
          <i class="ph ph-files"></i> <span class="sidebar-text">Semua Kegiatan</span>
        </li>
        <li class="nav-item" data-filter="status" data-value="pending">
          <i class="ph ph-clock"></i> <span class="sidebar-text">Belum Selesai</span>
        </li>
        <li class="nav-item" data-filter="status" data-value="completed">
          <i class="ph ph-check-circle"></i> <span class="sidebar-text">Selesai</span>
        </li>
        
        <li class="nav-label sidebar-text">Kategori</li>
        <div id="dynamic-categories-sidebar"></div>

        <li class="nav-label sidebar-text" style="margin-top:20px;">Opsi</li>
        <li class="nav-item" id="btn-open-settings">
          <i class="ph ph-gear"></i> <span class="sidebar-text">Atur Kategori</span>
        </li>
      </ul>

      <div class="user-profile">
        <img id="user-avatar" src="" alt="Avatar">
        <div class="user-info sidebar-text">
          <span id="user-name">Nama</span>
          <button id="btn-logout">Logout</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="content-wrapper">
        <header>
          <div>
            <h1 id="greeting">Halo!</h1>
            <p id="header-subtitle">Berikut adalah jadwalmu hari ini.</p>
          </div>
          <button id="btn-add-task" class="btn-primary">+ Kegiatan</button>
        </header>
        <div class="task-container" id="task-list"></div>
      </div>
    </main>
  </div>

  <!-- Modal Tambah Kegiatan -->
  <div id="modal" class="modal">
    <div class="modal-content glass-panel">
      <h3>Buat Kegiatan Baru</h3>
      
      <div class="input-group">
        <label>Judul Kegiatan</label>
        <input type="text" id="input-title" placeholder="Contoh: Rapat PMR" required>
      </div>

      <div class="form-row">
        <div class="input-group w-50">
          <label>Kategori</label>
          <select id="input-category"></select>
        </div>
        <div class="input-group w-50" id="field-sub-category" style="display: none;">
          <label>Sub Kategori</label>
          <select id="input-sub-category"></select>
        </div>
      </div>

      <div class="input-group" id="field-default-date" style="display: none;">
        <label>Tanggal Kegiatan</label>
        <input type="date" id="val-default-date">
      </div>

      <div class="form-row" id="field-long-date" style="display: none;">
        <div class="input-group w-50"><label>Tgl Mulai</label><input type="date" id="val-date-start"></div>
        <div class="input-group w-50"><label>Tgl Selesai</label><input type="date" id="val-date-end"></div>
      </div>

      <div class="input-group" id="field-deadline" style="display: none;">
        <label>Tanggal Deadline</label>
        <input type="date" id="val-date-deadline">
      </div>

      <div class="form-row" id="field-time-range" style="display: none;">
        <div class="input-group w-50"><label>Jam Mulai</label><input type="time" id="val-time-start"></div>
        <div class="input-group w-50"><label>Jam Selesai</label><input type="time" id="val-time-end"></div>
      </div>

      <div class="input-group" id="field-start-time" style="display: none;">
        <label>Jam Mulai Kegiatan</label>
        <input type="time" id="val-time-only">
      </div>

      <div class="input-group">
        <label>Catatan (Opsional)</label>
        <textarea id="input-notes" rows="2" placeholder="Tulis catatan tambahan di sini..."></textarea>
      </div>

      <div class="modal-actions">
        <button id="btn-cancel" class="btn-secondary">Batal</button>
        <button id="btn-save" class="btn-primary">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Modal Pengaturan Kategori -->
  <div id="modal-settings" class="modal">
    <div class="modal-content glass-panel" style="max-height: 85vh; overflow-y: auto;">
      <h3>Pengaturan Kategori Custom</h3>
      
      <div class="settings-form">
        <div class="input-group">
          <label>Nama Kategori Utama</label>
          <input type="text" id="set-cat-name" placeholder="Misal: Proyek Pribadi">
        </div>
        <div class="input-group">
          <label>Sub Kategori (Pisahkan dgn Koma)</label>
          <input type="text" id="set-sub-cat" placeholder="Misal: Desain, Coding">
        </div>

        <label style="font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; display: block;">Aktifkan Opsi Input:</label>
        <div class="checkbox-grid">
          <label class="chk-label"><input type="checkbox" id="chk-longdate"> Tgl Panjang</label>
          <label class="chk-label"><input type="checkbox" id="chk-timerange"> Lama Waktu</label>
          <label class="chk-label"><input type="checkbox" id="chk-deadline"> Deadline</label>
          <label class="chk-label"><input type="checkbox" id="chk-starttime"> Jam Mulai</label>
          <label class="chk-label"><input type="checkbox" id="chk-finishfast"> Selesaikan Cepat</label>
        </div>
        <div class="form-row" style="margin-top: 16px;">
          <button id="btn-cancel-edit-cat" class="btn-secondary" style="display: none; flex-grow: 1;">Batal Edit</button>
          <button id="btn-save-cat" class="btn-primary" style="flex-grow: 2;">Simpan Kategori</button>
        </div>
      </div>

      <hr style="border: 0; border-top: 1px dashed var(--sage-light); margin: 24px 0;">

      <h4>Kategori Tersimpan</h4>
      <ul id="list-categories" class="settings-list"></ul>
      
      <div class="modal-actions" style="margin-top:20px;">
        <button id="btn-close-settings" class="btn-primary">Tutup</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
